services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
      target: dev
    environment:
      # Pass components separately so the API can URL-encode the password —
      # avoids parse errors when POSTGRES_PASSWORD contains '@', ':', '/', etc.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      XCOMM_HUD_SECRET_KEY: ${XCOMM_HUD_SECRET_KEY}
      XCOMM_HUD_INITIAL_ADMIN_USER: ${XCOMM_HUD_INITIAL_ADMIN_USER:-admin}
      XCOMM_HUD_INITIAL_ADMIN_PASSWORD: ${XCOMM_HUD_INITIAL_ADMIN_PASSWORD:-changeme}
      # Object storage for the document library. The API creates the bucket
      # on first use — no separate init step needed.
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-xcomm-hud}
      S3_REGION: us-east-1
    ports:
      - "8001:8000"
    volumes:
      - ./api:/app:z
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "uv sync && uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  webui:
    build:
      context: ./webui
      target: dev
    environment:
      API_URL: http://api:8000
    ports:
      - "3001:3000"
    volumes:
      - ./webui:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
