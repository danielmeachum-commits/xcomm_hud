services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./api
    environment:
      # Pass components separately so the API can URL-encode the password —
      # avoids parse errors when POSTGRES_PASSWORD contains '@', ':', '/', etc.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      XCOMM_HUD_SECRET_KEY: ${XCOMM_HUD_SECRET_KEY}
      XCOMM_HUD_INITIAL_ADMIN_USER: ${XCOMM_HUD_INITIAL_ADMIN_USER:-admin}
      XCOMM_HUD_INITIAL_ADMIN_PASSWORD: ${XCOMM_HUD_INITIAL_ADMIN_PASSWORD:-changeme}
    ports:
      - "8001:8000"
    volumes:
      - ./api:/app:z
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "uv sync && uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  webui:
    build: ./webui
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_URL: http://api:8000
    ports:
      - "3001:3000"
    volumes:
      - ./webui:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  pgdata:
